<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何鑫實業 拌合機智庫</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; --text: #333; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }

        .admin-bar { background: #1a252f; color: #95a5a6; padding: 10px 20px; text-align: right; font-size: 0.9em; border-bottom: 1px solid #34495e; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        
        .container { width: 95%; max-width: 800px; margin: 20px auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; flex: 1; }
        
        .tab-menu { display: flex; background: #34495e; }
        .tab-btn { flex: 1; padding: 18px; border: none; color: #bdc3c7; cursor: pointer; background: none; font-size: 1.1em; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; font-weight: bold; }

        .tab-content { display: none; padding: 25px; box-sizing: border-box; }
        .tab-content.active { display: block; }

        /* 🛠️ 修正：按鈕超出格子 */
        .option-btn { 
            display: flex; justify-content: space-between; align-items: center; width: 100%; 
            padding: 15px 20px; margin: 10px 0; background: white; border: 1px solid #eee; 
            border-radius: 10px; cursor: pointer; box-sizing: border-box; overflow: hidden;
        }
        .option-btn:hover { border-color: var(--accent); background: #f0f7ff; }
        .option-text { flex: 1; font-weight: 500; font-size: 1.1em; text-align: left; word-break: break-all; }

        /* 操作指引回歸 */
        .guide-instruction { background: #ebf5fb; border-left: 5px solid var(--accent); padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .guide-instruction h4 { margin: 0 0 5px 0; color: var(--accent); }

        .input-field { width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 8px; font-size: 1em; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .main-btn { background: var(--success); color: white; border: none; padding: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.2em; font-weight: bold; }
        
        .step-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .step-item input { width: 22px; height: 22px; margin-right: 15px; flex-shrink: 0; }

        .footer-version { text-align: center; padding: 15px; color: #bdc3c7; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="admin-bar">
    <span id="admin-status">👤 訪客模式</span> | 
    <a href="javascript:void(0)" onclick="loginAdmin()" id="login-link" style="color:#3498db; text-decoration:none;">🔓 管理登入</a>
    <a href="javascript:void(0)" onclick="logoutAdmin()" id="logout-link" style="color:#e74c3c; text-decoration:none; display:none;">🔒 安全登出</a>
</div>

<div class="header">
    <h1>拌合機故障排查系統</h1>
</div>

<div class="container">
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('DiagTab')">🔍 排除指南</button>
        <button class="tab-btn" onclick="switchTab('InputTab')">✍️ 經驗回報</button>
        <button id="log-tab-btn" class="tab-btn" style="display:none;" onclick="switchTab('LogTab')">📊 分析</button>
    </div>

    <div id="DiagTab" class="tab-content active">
        <div id="diag-main-view">
            <input type="text" class="input-field" oninput="filterGuides(this.value)" style="border-radius:30px;" placeholder="🔍 搜尋狀況...">
            <div id="diag-options"></div>
        </div>
        <div id="checklist-container" style="display:none;">
            <div class="guide-instruction">
                <h4>📋 操作指引說明</h4>
                <p>請依照下列步驟排查故障。若問題持續，請聯繫廠務主管。</p>
            </div>
            <h2 id="checklist-title"></h2>
            <div id="checklist-content"></div>
            <button class="main-btn" style="background:var(--primary); margin-top:20px;" onclick="resetDiag()">← 返回</button>
        </div>
    </div>

    <div id="InputTab" class="tab-content">
        <label>故障狀況描述</label>
        <input type="text" id="f_issue" list="existing-issues" class="input-field" placeholder="描述現象">
        <datalist id="existing-issues"></datalist>

        <label>客戶 / 廠商名稱</label>
        <input type="text" id="f_client" class="input-field" placeholder="例如：嘉泰、國產">

        <label>所屬系統部位</label>
        <select id="f_part" class="input-field">
            <option value="動力系統">動力系統</option>
            <option value="密封系統">密封系統</option>
            <option value="卸料系統">卸料系統</option>
            <option value="潤滑系統">潤滑系統</option>
            <option value="攪拌系統">攪拌系統</option>
            <option value="輸送系統">輸送系統</option>
        </select>

        <label>處理的做法 (每行一個步驟)</label>
        <textarea id="f_steps" rows="5" class="input-field"></textarea>

        <button class="main-btn" onclick="saveData()">💾 儲存並同步</button>
    </div>

    <div id="LogTab" class="tab-content">
        <table style="width:100%;" id="logTable">
            <thead><tr style="background:#eee;"><th>日期</th><th>廠商</th><th>狀況</th><th>管理</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="footer-version">HEXIN V17.0.7 | 穩定登入修正版</div>

<script>
    // ⚠️ 根據你的 Firebase 控制台精確校對
    const firebaseConfig = { 
        apiKey: "AIzaSyBg0uXJqmwY4LnN-wMj2_cpMwb2UODlS84", 
        authDomain: "hexin-database.firebaseapp.com",
        databaseURL: "https://hexin-database-default-rtdb.firebaseio.com",
        projectId: "hexin-database",
        storageBucket: "hexin-database.appspot.com",
        messagingSenderId: "210866724253",
        appId: "1:210866724253:web:2824417583a4ace84e2374"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    let guideDB = {}; let logsDB = {}; let isAdmin = false;

    auth.onAuthStateChanged((user) => {
        if (user && user.email === "fac@herhsin.com") {
            isAdmin = true;
            document.getElementById('admin-status').innerHTML = `🔑 已登入: ${user.email}`;
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('log-tab-btn').style.display = 'block';
        } else {
            isAdmin = false;
            document.getElementById('admin-status').innerText = "👤 訪客模式";
            document.getElementById('login-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'none';
            document.getElementById('log-tab-btn').style.display = 'none';
        }
        renderLogs();
    });

    async function loginAdmin() {
        const password = prompt("主管您好，請輸入授權密碼：");
        if(!password) return;
        try {
            await auth.signInWithEmailAndPassword("fac@herhsin.com", password);
            alert("✅ 驗證成功");
        } catch (error) {
            alert("❌ 登入失敗！\n錯誤原因：" + error.message);
        }
    }

    function logoutAdmin() { if(confirm("確定登出？")) auth.signOut().then(() => location.reload()); }

    database.ref('guide').on('value', (snap) => { guideDB = snap.val() || {}; resetDiag(); });
    database.ref('logs').on('value', (snap) => { logsDB = snap.val() || {}; renderLogs(); });

    function resetDiag() {
        document.getElementById('diag-main-view').style.display = 'block';
        document.getElementById('checklist-container').style.display = 'none';
        const options = document.getElementById('diag-options');
        options.innerHTML = '';
        const parts = [...new Set(Object.values(guideDB).map(i => i.part))];
        parts.forEach(part => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="option-text">📂 ${part}</span><span>→</span>`;
            btn.onclick = () => showCategory(part);
            options.appendChild(btn);
        });
    }

    function showCategory(partName) {
        const options = document.getElementById('diag-options');
        options.innerHTML = `<h3 style="color:var(--accent);">${partName}</h3>`;
        Object.keys(guideDB).forEach(key => {
            if(guideDB[key].part === partName) {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-text">❓ ${guideDB[key].issue}</span>`;
                btn.onclick = () => showChecklist(key);
                options.appendChild(btn);
            }
        });
    }

    function showChecklist(key) {
        const item = guideDB[key];
        document.getElementById('diag-main-view').style.display = 'none';
        document.getElementById('checklist-container').style.display = 'block';
        document.getElementById('checklist-title').innerText = item.issue;
        document.getElementById('checklist-content').innerHTML = item.steps.map(s => `<div class="step-item"><label><input type="checkbox"> ${s}</label></div>`).join('');
    }

    async function saveData() {
        const issue = document.getElementById('f_issue').value.trim();
        const part = document.getElementById('f_part').value;
        const client = document.getElementById('f_client').value.trim();
        const steps = document.getElementById('f_steps').value.trim();
        if(!issue || !steps) return alert("請完整填寫！");
        const data = { part, issue, client, steps: steps.split('\n'), date: new Date().toLocaleDateString() };
        await database.ref('guide').push(data);
        await database.ref('logs').push(data);
        alert("💾 資料已成功儲存");
        document.getElementById('f_issue').value = ""; document.getElementById('f_client').value = ""; document.getElementById('f_steps').value = "";
    }

    function renderLogs() {
        const tbody = document.querySelector('#logTable tbody'); if(!tbody) return;
        tbody.innerHTML = '';
        Object.keys(logsDB).reverse().forEach(key => {
            const log = logsDB[key];
            tbody.innerHTML += `<tr><td style="padding:10px;">${log.date}</td><td>${log.client || '-'}</td><td>${log.issue}</td><td>${isAdmin ? '<button onclick="deleteLog(\''+key+'\')">刪</button>' : '-'}</td></tr>`;
        });
    }

    async function deleteLog(key) { if(confirm("確定刪除？")) await database.ref('logs/'+key).remove(); }
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
    function filterGuides(kw) {
        if(!kw) { resetDiag(); return; }
        const options = document.getElementById('diag-options'); options.innerHTML = '';
        Object.keys(guideDB).forEach(key => {
            if(guideDB[key].issue.includes(kw)) {
                const btn = document.createElement('div'); btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-text">[${guideDB[key].part}] ${guideDB[key].issue}</span>`;
                btn.onclick = () => showChecklist(key); options.appendChild(btn);
            }
        });
    }
</script>
</body>
</html>
