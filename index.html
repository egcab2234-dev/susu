<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何鑫實業 拌合機故障排查 雲端智庫</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; --danger: #e74c3c; --warning: #f1c40f; --text: #333; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }

        /* Header 與 Admin Bar */
        .header { background: var(--primary); color: white; padding: 15px 20px; text-align: center; }
        .header-content { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .header-logo { height: 55px; width: auto; object-fit: contain; }
        .admin-bar { background: #1a252f; color: #95a5a6; padding: 10px 20px; text-align: right; font-size: 0.9em; }
        
        .container { width: 95%; max-width: 800px; margin: 20px auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; flex: 1; display: flex; flex-direction: column; }
        
        /* 頁籤 UI */
        .tab-menu { display: flex; background: #34495e; }
        .tab-btn { flex: 1; padding: 18px 5px; border: none; color: #bdc3c7; cursor: pointer; background: none; font-size: 1.05em; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; font-weight: bold; }

        .tab-content { display: none; padding: 20px; box-sizing: border-box; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }

        /* 🛠️ 解決按鈕超出格子的問題 */
        .option-btn { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            padding: 18px 20px; 
            margin: 10px 0; 
            background: white; 
            border: 1px solid #eee; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.2s; 
            box-sizing: border-box;
            overflow: hidden;
        }
        .option-btn:hover { border-color: var(--accent); background: #f0f7ff; transform: translateY(-2px); }
        .option-text { flex: 1; font-weight: 500; font-size: 1.1em; white-space: normal; word-break: break-all; text-align: left; }

        /* ✨ 操作指引說明回歸 */
        .guide-instruction { background: #ebf5fb; border-left: 5px solid var(--accent); padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .guide-instruction h4 { margin: 0 0 5px 0; color: var(--accent); font-size: 1.1em; }

        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        .input-field { width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 8px; font-size: 1.05em; box-sizing: border-box; outline: none; }
        .input-field:focus { border-color: var(--accent); }

        .main-btn { background: var(--success); color: white; border: none; padding: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.2em; font-weight: bold; margin-top: 10px; }
        
        .step-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: flex-start; }
        .step-item input { width: 22px; height: 22px; margin-right: 15px; flex-shrink: 0; margin-top: 2px; }

        .locked-field { background-color: #f8f9fa !important; color: #7f8c8d !important; border: 1px dashed #ccc !important; cursor: not-allowed; }
        .footer-version { text-align: center; padding: 15px; color: #bdc3c7; font-size: 0.75em; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="admin-bar">
    <span id="admin-status">👤 訪客模式</span> | 
    <a href="javascript:void(0)" onclick="loginAdmin()" id="login-link" style="color:#3498db; font-weight:bold; text-decoration:none;">🔓 管理登入</a>
    <a href="javascript:void(0)" onclick="logoutAdmin()" id="logout-link" style="color:#e74c3c; font-weight:bold; text-decoration:none; display:none;">🔒 安全登出</a>
</div>

<div class="header">
    <div class="header-content">
        <img src="logo.png" alt="何鑫實業" class="header-logo" onerror="this.style.display='none';">
        <h1>拌合機故障排查智庫</h1>
    </div>
</div>

<div class="container">
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('DiagTab')">🔍 排除指南</button>
        <button class="tab-btn" onclick="switchTab('InputTab')">✍️ 經驗回報</button>
        <button id="log-tab-btn" class="tab-btn" style="display:none;" onclick="switchTab('LogTab')">📊 分析</button>
    </div>

    <div id="DiagTab" class="tab-content active">
        <div id="diag-main-view">
            <input type="text" class="input-field" oninput="filterGuides(this.value)" style="border-radius:30px; margin-bottom:20px;" placeholder="🔍 搜尋狀況關鍵字...">
            <div id="diag-options"></div>
        </div>
        <div id="checklist-container" style="display:none;">
            <div class="guide-instruction">
                <h4>📋 操作指引說明</h4>
                <p>請依照下方步驟逐一進行排查並勾選。若所有步驟皆無效，請聯繫主管。</p>
            </div>
            <h2 id="checklist-title" style="color:var(--primary); font-size:1.3em; margin-bottom:15px; border-bottom:2px solid var(--accent); padding-bottom:10px;"></h2>
            <div id="checklist-content"></div>
            <button class="main-btn" style="background:var(--primary); margin-top:25px;" onclick="resetDiag()">← 返回系統分類</button>
        </div>
    </div>

    <div id="InputTab" class="tab-content">
        <div id="duplicate-warning" style="display:none; background:#fff9e6; border-left:5px solid var(--warning); padding:12px; border-radius:8px; margin-bottom:15px; color:#856404;">
            ⚠️ <b>系統提醒：</b> 此故障已存在，已自動帶入所屬部位。
        </div>

        <div class="form-group">
            <label class="form-label">故障狀況描述</label>
            <input type="text" id="f_issue" list="existing-issues" oninput="checkDuplicate(this.value)" class="input-field" placeholder="描述故障現象">
            <datalist id="existing-issues"></datalist>
        </div>

        <div class="form-group">
            <label class="form-label">客戶 / 廠商名稱</label>
            <input type="text" id="f_client" class="input-field" placeholder="輸入廠商名稱 (如：嘉泰、國產...)">
        </div>

        <div class="form-group">
            <label class="form-label">所屬系統部位</label>
            <select id="f_part" class="input-field">
                <option value="">-- 請選擇系統 --</option>
                <option value="動力系統">動力系統</option>
                <option value="密封系統">密封系統</option>
                <option value="卸料系統">卸料系統</option>
                <option value="潤滑系統">潤滑系統</option>
                <option value="攪拌系統">攪拌系統</option>
                <option value="輸送系統">輸送系統</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">處理的做法 (每行一個步驟)</label>
            <textarea id="f_steps" rows="6" class="input-field" placeholder="1. 檢查電源&#10;2. 更換墊片..."></textarea>
        </div>

        <button class="main-btn" onclick="saveData()">💾 儲存經驗並更新雲端</button>
    </div>

    <div id="LogTab" class="tab-content">
        <h3 style="color:var(--primary);">智庫紀錄分析</h3>
        <div style="overflow-x: auto;">
            <table style="width:100%; border-collapse: collapse; font-size:0.9em;" id="logTable">
                <thead><tr style="background:#f8f9fa; border-bottom:2px solid #ddd;"><th style="padding:10px;">日期</th><th>廠商</th><th>狀況</th><th>管理</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div class="footer-version">HEXIN 3M3 SYSTEM | 版本號：V17.0.6 | 登入與佈局最終修正版</div>

<script>
    // ✨ 根據截圖精確對準 Firebase 配置
    const firebaseConfig = { 
        apiKey: "AIzaSyBg0uXJqmwY4LnN-wMj2_cpMwb2UODlS84", 
        authDomain: "hexin-database.firebaseapp.com",
        databaseURL: "https://hexin-database-default-rtdb.firebaseio.com",
        projectId: "hexin-database",
        storageBucket: "hexin-database.appspot.com",
        messagingSenderId: "210866724253",
        appId: "1:210866724253:web:2824417583a4ace84e2374"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    let guideDB = {}; let logsDB = {}; let isAdmin = false;

    // 權限狀態監聽
    auth.onAuthStateChanged((user) => {
        if (user && user.email === "fac@herhsin.com") {
            isAdmin = true;
            document.getElementById('admin-status').innerHTML = `🔑 歡迎：${user.email}`;
            document.getElementById('login-link').style.display = 'none';
            document.getElementById('logout-link').style.display = 'inline';
            document.getElementById('log-tab-btn').style.display = 'block';
        } else {
            isAdmin = false;
            document.getElementById('admin-status').innerText = "👤 訪客模式";
            document.getElementById('login-link').style.display = 'inline';
            document.getElementById('logout-link').style.display = 'none';
            document.getElementById('log-tab-btn').style.display = 'none';
        }
        renderLogs();
    });

    async function loginAdmin() {
        const password = prompt("主管您好，請輸入授權密碼：");
        if(!password) return;
        try {
            await auth.signInWithEmailAndPassword("fac@herhsin.com", password);
            alert("✅ 驗證成功");
        } catch (error) {
            console.error(error);
            alert("❌ 登入失敗！\n1. 請確認 Firebase 設定已生效\n2. 請確認密碼是否正確");
        }
    }

    function logoutAdmin() { if(confirm("確定登出？")) auth.signOut().then(() => location.reload()); }

    database.ref('guide').on('value', (snap) => { guideDB = snap.val() || {}; resetDiag(); updateDatalist(); });
    database.ref('logs').on('value', (snap) => { logsDB = snap.val() || {}; renderLogs(); });

    function resetDiag() {
        document.getElementById('diag-main-view').style.display = 'block';
        document.getElementById('checklist-container').style.display = 'none';
        const options = document.getElementById('diag-options');
        options.innerHTML = '';
        const parts = [...new Set(Object.values(guideDB).map(i => i.part))];
        parts.forEach(part => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="option-text">📂 ${part}</span><span style="color:#bdc3c7;">展開 →</span>`;
            btn.onclick = () => showCategory(part);
            options.appendChild(btn);
        });
    }

    function showCategory(partName) {
        const options = document.getElementById('diag-options');
        options.innerHTML = `<h3 style="color:var(--accent); margin-bottom:15px; border-left:4px solid var(--accent); padding-left:10px;">${partName}</h3>`;
        Object.keys(guideDB).forEach(key => {
            if(guideDB[key].part === partName) {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-text">❓ ${guideDB[key].issue}</span>`;
                btn.onclick = () => showChecklist(key);
                options.appendChild(btn);
            }
        });
        const backBtn = document.createElement('button');
        backBtn.className = 'main-btn'; backBtn.style.background = '#95a5a6'; backBtn.innerHTML = '← 返回系統部位分類'; backBtn.onclick = resetDiag;
        options.appendChild(backBtn);
    }

    function showChecklist(key) {
        const item = guideDB[key];
        document.getElementById('diag-main-view').style.display = 'none';
        document.getElementById('checklist-container').style.display = 'block';
        document.getElementById('checklist-title').innerText = item.issue;
        document.getElementById('checklist-content').innerHTML = item.steps.map(s => `<div class="step-item"><label style="display:flex; cursor:pointer;"><input type="checkbox"> <span>${s}</span></label></div>`).join('');
    }

    function checkDuplicate(val) {
        const warning = document.getElementById('duplicate-warning');
        const partSelect = document.getElementById('f_part');
        let match = Object.values(guideDB).find(i => i.issue.trim() === val.trim());
        if(match) {
            warning.style.display = 'block';
            partSelect.value = match.part;
            partSelect.disabled = true;
            partSelect.classList.add('locked-field');
        } else {
            warning.style.display = 'none';
            partSelect.disabled = false;
            partSelect.classList.remove('locked-field');
        }
    }

    function updateDatalist() {
        const dl = document.getElementById('existing-issues'); dl.innerHTML = '';
        Object.values(guideDB).forEach(item => {
            let opt = document.createElement('option'); opt.value = item.issue; dl.appendChild(opt);
        });
    }

    async function saveData() {
        const issue = document.getElementById('f_issue').value.trim();
        const part = document.getElementById('f_part').value;
        const client = document.getElementById('f_client').value.trim();
        const steps = document.getElementById('f_steps').value.trim();
        if(!issue || !part || !steps) return alert("請完整填寫必填欄位！");
        const data = { part, issue, client, steps: steps.split('\n'), date: new Date().toLocaleDateString() };
        await database.ref('guide').push(data);
        await database.ref('logs').push(data);
        alert("✅ 儲存成功並更新智庫");
        document.getElementById('f_issue').value = ""; document.getElementById('f_client').value = ""; document.getElementById('f_steps').value = "";
    }

    function renderLogs() {
        const tbody = document.querySelector('#logTable tbody'); if(!tbody) return;
        tbody.innerHTML = '';
        Object.keys(logsDB).reverse().forEach(key => {
            const log = logsDB[key];
            tbody.innerHTML += `<tr style="border-bottom:1px solid #eee;"><td style="padding:10px;">${log.date}</td><td>${log.client || '-'}</td><td>${log.issue}</td><td>${isAdmin ? '<button style="color:red; background:none; border:none; cursor:pointer;" onclick="deleteLog(\''+key+'\')">刪除</button>' : '-'}</td></tr>`;
        });
    }

    async function deleteLog(key) { if(confirm("確定刪除？")) await database.ref('logs/'+key).remove(); }
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
    function filterGuides(kw) {
        if(!kw) { resetDiag(); return; }
        const options = document.getElementById('diag-options'); options.innerHTML = '';
        Object.keys(guideDB).forEach(key => {
            if(guideDB[key].issue.includes(kw)) {
                const btn = document.createElement('div'); btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-text">[${guideDB[key].part}] ${guideDB[key].issue}</span>`;
                btn.onclick = () => showChecklist(key); options.appendChild(btn);
            }
        });
    }
</script>
</body>
</html>
