<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何鑫雲端智庫 V11.0 - 精細步驟管理版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; --danger: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .admin-bar { background: #1a252f; color: #95a5a6; padding: 10px 20px; text-align: right; font-size: 0.9em; }
        .container { max-width: 1000px; margin: 20px auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .tab-menu { display: flex; background: #34495e; }
        .tab-btn { flex: 1; padding: 18px; border: none; color: #bdc3c7; cursor: pointer; background: none; font-size: 1.05em; }
        .tab-btn.active { background: var(--accent); color: white; font-weight: bold; }
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }

        .option-btn { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; padding: 18px 20px; margin: 12px 0; 
            background: white; border: 1px solid #ddd; border-radius: 8px; 
            text-align: left; cursor: pointer; box-sizing: border-box; 
        }
        .option-btn:hover { border-color: var(--accent); background: #f0f7ff; }
        .option-text { flex-grow: 1; font-size: 1.1em; color: #333; }

        /* 步驟清單內的刪除排版 */
        .checklist-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 14px; border-bottom: 1px solid #eee; font-size: 1.1em; 
        }
        .checklist-left { display: flex; align-items: center; flex-grow: 1; }
        .checklist-left input { width: 22px; height: 22px; margin-right: 15px; }
        
        .btn-delete-small { 
            color: var(--danger); border: 1px solid var(--danger); background: white; 
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; 
            white-space: nowrap; margin-left: 10px;
        }
        .btn-delete-small:hover { background: var(--danger); color: white; }

        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .main-btn { background: var(--success); color: white; border: none; padding: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-bar">
    <span id="admin-status">👤 身分：一般維修員</span> | 
    <a href="javascript:void(0)" onclick="loginAdmin()" style="color:#3498db; text-decoration:none; font-weight:bold;">🔓 管理員登入</a>
</div>

<div class="header">
    <h1>何鑫實業 3M3 雲端維修智庫</h1>
</div>

<div class="container">
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('DiagTab')">🔍 排除指南</button>
        <button class="tab-btn" onclick="switchTab('InputTab')">✍️ 經驗回報</button>
        <button class="tab-btn" onclick="switchTab('LogTab')">📋 維修日誌</button>
    </div>

    <div id="DiagTab" class="tab-content active">
        <div id="diag-container">
            <h3>🤖 智慧診斷助手</h3>
            <div id="diag-options">正在載入雲端智庫...</div>
        </div>
        <div id="checklist-container" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="checklist-title"></h3>
                <span id="guide-key-display" style="display:none;"></span>
            </div>
            <div id="checklist-content"></div>
            <button class="option-btn" style="justify-content:center; background:#eee; font-weight:bold; margin-top:20px;" onclick="resetDiag()">← 返回部位選擇</button>
        </div>
    </div>

    <div id="InputTab" class="tab-content">
        <h3>新增維修經驗</h3>
        <div class="form-group">
            <label>故障日期</label>
            <input type="date" id="f_date">
        </div>
        <div class="form-group">
            <label>故障狀況描述</label>
            <input type="text" id="f_issue" list="existing-issues" placeholder="請輸入故障現象">
            <datalist id="existing-issues"></datalist>
        </div>
        <div class="form-group">
            <label>所屬部位</label>
            <select id="f_part">
                <option value="">-- 請選擇 --</option>
                <option value="動力系統">動力系統</option>
                <option value="密封系統">密封系統</option>
                <option value="卸料系統">卸料系統</option>
                <option value="潤滑系統">潤滑系統</option>
                <option value="攪拌系統">攪拌系統</option>
            </select>
        </div>
        <div class="form-group">
            <label>此次維修動作 (每行一個步驟)</label>
            <textarea id="f_steps" rows="5"></textarea>
        </div>
        <button class="main-btn" onclick="saveData()">💾 儲存並同步雲端</button>
    </div>

    <div id="LogTab" class="tab-content">
        <h3>雲端維修日誌</h3>
        <table id="logTable" style="width:100%; border-collapse: collapse;">
            <thead><tr style="background:#f8f9fa;">
                <th style="padding:12px; text-align:left;">日期</th>
                <th style="padding:12px; text-align:left;">部位</th>
                <th style="padding:12px; text-align:left;">故障狀況</th>
                <th class="admin-only" style="display:none; padding:12px; text-align:left;">操作</th>
            </tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://hexin-database-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let guideDB = {};
    let logsDB = {};
    let isAdmin = false;
    const ADMIN_PW = "888";

    function loginAdmin() {
        if(prompt("請輸入管理員密碼：") === ADMIN_PW) {
            isAdmin = true;
            document.getElementById('admin-status').innerText = "🔑 身分：系統管理員";
            document.getElementById('admin-status').style.color = "#27ae60";
            resetDiag(); renderLogs();
            alert("已取得管理權限，現在可以針對「個別步驟」進行刪除。");
        } else { alert("密碼錯誤！"); }
    }

    database.ref('guide').on('value', (snap) => { guideDB = snap.val() || {}; updateDatalist(); resetDiag(); });
    database.ref('logs').on('value', (snap) => { logsDB = snap.val() || {}; renderLogs(); });

    async function saveData() {
        const date = document.getElementById('f_date').value;
        const part = document.getElementById('f_part').value;
        const issue = document.getElementById('f_issue').value.trim();
        const stepsRaw = document.getElementById('f_steps').value.trim();
        if(!part || !issue || !stepsRaw) { alert("請填寫完整！"); return; }
        
        const newSteps = stepsRaw.split('\n').map(s => s.trim()).filter(s => s !== "");
        let existingKey = Object.keys(guideDB).find(key => guideDB[key].issue === issue);

        if(existingKey) {
            let combined = [...guideDB[existingKey].steps, ...newSteps];
            await database.ref('guide/' + existingKey).update({ steps: [...new Set(combined)] });
        } else {
            await database.ref('guide').push({ part, issue, steps: newSteps });
        }
        await database.ref('logs').push({ date, part, issue });
        alert("資料已成功存入雲端！");
        switchTab('DiagTab');
    }

    // 刪除整個題目
    async function deleteGuideItem(key, event) {
        event.stopPropagation();
        if(!isAdmin) return;
        if(confirm("確定要將此「故障狀況」連同所有步驟一起移除嗎？")) {
            await database.ref('guide/' + key).remove();
        }
    }

    // 刪除單個步驟 (新增功能)
    async function deleteStep(guideKey, stepIndex) {
        if(!isAdmin) return;
        if(confirm("確定要刪除這項點檢步驟嗎？")) {
            let currentSteps = [...guideDB[guideKey].steps];
            currentSteps.splice(stepIndex, 1); // 移除該索引的步驟
            
            if(currentSteps.length === 0) {
                // 如果刪到沒半個步驟了，就直接移除該問題
                await database.ref('guide/' + guideKey).remove();
            } else {
                await database.ref('guide/' + guideKey).update({ steps: currentSteps });
            }
            // 重新顯示更新後的清單
            showChecklist(guideKey);
        }
    }

    async function deleteLog(key) {
        if(!isAdmin) return;
        if(confirm("確定刪除此日誌紀錄？")) await database.ref('logs/' + key).remove();
    }

    function resetDiag() {
        const options = document.getElementById('diag-options');
        document.getElementById('diag-container').style.display = 'block';
        document.getElementById('checklist-container').style.display = 'none';
        options.innerHTML = '';
        const guides = guideDB;
        const parts = [...new Set(Object.values(guides).map(i => i.part))];
        
        parts.forEach(part => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="option-text">📂 ${part}</span>`;
            btn.onclick = () => {
                options.innerHTML = `<h4>[${part}] 請選擇故障狀況：</h4>`;
                Object.keys(guides).filter(k => guides[k].part === part).forEach(key => {
                    const item = guides[key];
                    const ibtn = document.createElement('div');
                    ibtn.className = 'option-btn';
                    ibtn.innerHTML = `
                        <span class="option-text">❓ ${item.issue} (${item.steps.length}項)</span>
                        ${isAdmin ? `<button class="btn-delete-small" onclick="deleteGuideItem('${key}', event)">🗑️ 刪除整題</button>` : ''}
                    `;
                    ibtn.onclick = () => showChecklist(key);
                    options.appendChild(ibtn);
                });
                const b = document.createElement('button');
                b.className='option-btn'; b.style.justifyContent='center'; b.innerHTML='<span style="font-weight:bold;">← 返回</span>'; b.onclick=resetDiag;
                options.appendChild(b);
            };
            options.appendChild(btn);
        });
    }

    function showChecklist(guideKey) {
        const item = guideDB[guideKey];
        if(!item) { resetDiag(); return; } // 如果資料已被刪除則回上一頁

        document.getElementById('diag-container').style.display = 'none';
        document.getElementById('checklist-container').style.display = 'block';
        document.getElementById('checklist-title').innerText = `✅ 排查：${item.issue}`;
        const content = document.getElementById('checklist-content');
        content.innerHTML = '';
        
        item.steps.forEach((step, index) => {
            content.innerHTML += `
                <div class="checklist-item">
                    <div class="checklist-left">
                        <input type="checkbox" id="step_${index}"> 
                        <label for="step_${index}">${step}</label>
                    </div>
                    ${isAdmin ? `<button class="btn-delete-small" onclick="deleteStep('${guideKey}', ${index})">❌ 刪除此項</button>` : ''}
                </div>`;
        });
    }

    function renderLogs() {
        const tbody = document.querySelector('#logTable tbody');
        tbody.innerHTML = '';
        Object.keys(logsDB).reverse().forEach(key => {
            const log = logsDB[key];
            tbody.innerHTML += `<tr style="border-bottom: 1px solid #eee;">
                <td style="padding:12px;">${log.date}</td>
                <td style="padding:12px;">${log.part}</td>
                <td style="padding:12px;">${log.issue}</td>
                <td style="${isAdmin ? '' : 'display:none;'} padding:12px;">
                    <button class="btn-delete-small" onclick="deleteLog('${key}')">刪除紀錄</button>
                </td>
            </tr>`;
        });
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateDatalist() {
        const datalist = document.getElementById('existing-issues');
        datalist.innerHTML = '';
        Object.values(guideDB).forEach(item => {
            let opt = document.createElement('option'); opt.value = item.issue; datalist.appendChild(opt);
        });
    }

    window.onload = () => document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
